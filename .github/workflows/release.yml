name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

  npm:
    runs-on: ubuntu-latest
    needs: goreleaser
    defaults:
      run:
        working-directory: npm/encrata
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: npm/encrata/package.json

      - name: Validate tag matches npm version
        run: |
          node -e "
          const fs = require('fs');
          const pkg = require('./package.json');
          const install = fs.readFileSync('install.js', 'utf8');
          const match = install.match(/const VERSION = \"([^\"]+)\";/);
          if (!match) throw new Error('install.js VERSION constant was not found');
          const tag = process.env.GITHUB_REF_NAME.replace(/^v/, '');
          if (pkg.version !== tag) throw new Error('package.json version ' + pkg.version + ' does not match tag ' + tag);
          if (match[1] !== tag) throw new Error('install.js VERSION ' + match[1] + ' does not match tag ' + tag);
          "

      - name: Check package contents
        run: npm pack --dry-run

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
