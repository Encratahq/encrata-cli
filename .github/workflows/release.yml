name: release

# Runs whenever you push a version tag, for e.g.:
#   git tag v0.4.0
#   git push origin v0.4.0
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # needed to create the GitHub Release in this repo

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so GoReleaser can build the changelog

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          # Provided automatically by Actions — used to create the Release here.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # A Personal Access Token (or fine-grained token) with WRITE access to
          # Encratahq/homebrew-tap, so GoReleaser can push the updated formula.
          # Add it under: cli repo → Settings → Secrets and variables → Actions.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
